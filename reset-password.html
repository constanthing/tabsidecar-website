<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password · TabSidecar</title>
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon32.png">
  <link rel="shortcut icon" href="icons/icon32.png">
  <link rel="stylesheet" href="base.css">
  <style>
    .reset-main {
      min-height: calc(100vh - 60px);
      display: grid;
      align-items: center;
      padding: 54px 0;
    }

    .reset-card {
      max-width: 460px;
      margin: 0 auto;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .reset-card h1 {
      font-size: 34px;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .reset-copy {
      color: var(--ink-2);
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 22px;
    }

    .reset-form {
      display: grid;
      gap: 12px;
    }

    .reset-form label {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-2);
    }

    .reset-form input {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 16px;
      outline: none;
    }

    .reset-form input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(58, 99, 214, 0.14);
    }

    .reset-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .reset-status {
      display: none;
      padding: 10px 12px;
      border-radius: 9px;
      font-size: 14px;
      line-height: 1.45;
    }

    .reset-status.show {
      display: block;
    }

    .reset-status.error {
      background: #fff0f0;
      color: #a83232;
    }

    .reset-status.success {
      background: #edf8f2;
      color: var(--green);
    }

    .reset-small {
      margin: 14px 0 0;
      color: var(--ink-3);
      font-size: 14px;
      line-height: 1.45;
    }

    @media (max-width: 560px) {
      .reset-main {
        align-items: start;
        padding: 32px 0;
      }

      .reset-card {
        padding: 22px;
      }

      .reset-card h1 {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="wrap nav-in">
      <a href="/" class="logo">
        <img src="icons/icon32.png" class="logo-ic" alt="">
        <span>TabSidecar</span>
      </a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/privacy.html">Privacy</a>
      </div>
    </div>
  </nav>

  <main class="reset-main">
    <div class="wrap">
      <section class="reset-card" aria-labelledby="reset-title">
        <h1 id="reset-title">Reset your password</h1>
        <p class="reset-copy">Choose a new password for your TabSidecar account.</p>

        <form class="reset-form" id="reset-form">
          <label for="new-password">New password</label>
          <input id="new-password" name="new-password" type="password" autocomplete="new-password" minlength="6" required>

          <label for="confirm-password">Confirm password</label>
          <input id="confirm-password" name="confirm-password" type="password" autocomplete="new-password" minlength="6" required>

          <div class="reset-status" id="reset-status" role="status" aria-live="polite"></div>

          <div class="reset-actions">
            <button class="btn" type="submit" id="reset-submit">Update Password</button>
            <a class="btn ghost" href="/">Cancel</a>
          </div>
        </form>

        <p class="reset-small">This link expires shortly. If it no longer works, request another password reset from the TabSidecar extension.</p>
      </section>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://quqhdnkypnuxvmibnzhn.supabase.co';
    const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_2O_Jk16JhJLmK7bFtLHsNQ_ifUzkz1Z';

    const form = document.getElementById('reset-form');
    const submitButton = document.getElementById('reset-submit');
    const statusEl = document.getElementById('reset-status');
    const passwordInput = document.getElementById('new-password');
    const confirmInput = document.getElementById('confirm-password');

    function getRecoveryParams() {
      const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : window.location.hash;
      return new URLSearchParams(hash);
    }

    function showStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = `reset-status show ${type}`;
    }

    function getAccessToken() {
      const params = getRecoveryParams();
      const type = params.get('type');
      const token = params.get('access_token');
      if (type !== 'recovery' || !token) {
        return null;
      }
      return token;
    }

    const accessToken = getAccessToken();

    if (!accessToken) {
      form.querySelectorAll('input, button').forEach((element) => {
        element.disabled = true;
      });
      showStatus('This reset link is missing or expired. Request a new password reset from the TabSidecar extension.', 'error');
    } else {
      history.replaceState(null, document.title, window.location.pathname);
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const password = passwordInput.value;
      const confirmPassword = confirmInput.value;

      if (!accessToken) {
        showStatus('This reset link is missing or expired. Request a new password reset from the TabSidecar extension.', 'error');
        return;
      }

      if (password.length < 6) {
        showStatus('Use at least 6 characters for your new password.', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showStatus('The passwords do not match.', 'error');
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = 'Updating...';
      showStatus('Updating your password...', 'success');

      try {
        const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          method: 'PUT',
          headers: {
            apikey: SUPABASE_PUBLISHABLE_KEY,
            Authorization: `Bearer ${accessToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ password })
        });

        const text = await response.text();
        const body = text ? JSON.parse(text) : null;

        if (!response.ok) {
          throw new Error(body?.msg || body?.message || body?.error_description || body?.error || 'Could not update your password.');
        }

        history.replaceState(null, document.title, window.location.pathname);
        showStatus('Password updated. You can now sign in from the TabSidecar extension.', 'success');
        form.reset();
      } catch (error) {
        showStatus(error.message || 'Could not update your password.', 'error');
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
