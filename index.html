  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"08c213ec-8777-466e-967c-eec2c7dbad91\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<link rel=\"icon\" type=\"image/png\" sizes=\"16x16\" href=\"icons/default-favicon.png\">\n<link rel=\"icon\" type=\"image/png\" sizes=\"32x32\" href=\"icons/default-favicon.png\">\n<link rel=\"shortcut icon\" href=\"icons/default-favicon.png\">\n<style>\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n  :root {\n    --bg:      #fbfbfa;\n    --ink:     #2c2a26;\n    --ink-2:   #5f5b53;\n    --ink-3:   #8d887e;\n    --line:    #e9e7e2;\n    --line-2:  #f0eeea;\n    --accent:  #3a63d6;\n    --accent-soft: #eef2fc;\n    --green:   #2e9460;\n    --orange:  #cf7a2c;\n    --purple:  #7a52cf;\n    --mark:    #fbe6a4;\n    --card:    #ffffff;\n  }\n  html { scroll-behavior: smooth; }\n  body { font-family: \"Hanken Grotesk\", -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--ink); line-height: 1.6; font-size: 17px; -webkit-font-smoothing: antialiased; }\n  .wrap { max-width: 880px; margin: 0 auto; padding: 0 28px; }\n  a { color: inherit; }\n\n  nav { position: sticky; top: 0; z-index: 20; background: rgba(251,251,250,.85); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line-2); }\n  .nav-in { max-width: 880px; margin: 0 auto; padding: 0 28px; height: 60px; display: flex; align-items: center; justify-content: space-between; }\n  .logo { display: flex; align-items: center; gap: 9px; font-weight: 600; font-size: 16px; letter-spacing: -.01em; text-decoration: none; white-space: nowrap; }\n  .mark-i { width: 22px; height: 22px; border-radius: 6px; background: var(--ink); display: grid; place-items: center; flex-shrink: 0; }\n  .logo-ic { width: 20px; height: 20px; display: block; border-radius: 6px; flex-shrink: 0; }\n  .nav-links { display: flex; align-items: center; gap: 22px; font-size: 14.5px; color: var(--ink-2); }\n  .nav-links a { text-decoration: none; }\n  .nav-links a:hover { color: var(--ink); }\n  .nav-links a.btn:hover { color: #fff; }\n  .btn { display: inline-flex; align-items: center; gap: 8px; font: inherit; font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer; border: 0; border-radius: 9px; padding: 8px 15px; background: var(--accent); color: #fff; transition: background .15s, transform .1s; }\n  .btn:hover { background: #2d52bd; }\n  .btn:active { transform: translateY(1px); }\n  .btn-lg { padding: 13px 22px; font-size: 15.5px; border-radius: 11px; }\n  .btn-ghost { background: transparent; color: var(--ink-2); border: 1px solid var(--line); }\n  .btn-ghost:hover { background: #fff; color: var(--ink); }\n\n  section { padding: 80px 0; }\n  section + section { border-top: 1px solid var(--line-2); }\n  .eyebrow { font-size: 13px; font-weight: 700; letter-spacing: .02em; margin-bottom: 16px; }\n  .eyebrow.blue { color: var(--accent); }\n  .eyebrow.green { color: var(--green); }\n  .eyebrow.orange { color: var(--orange); }\n  .eyebrow.purple { color: var(--purple); }\n  h1 { font-size: clamp(36px, 6vw, 54px); font-weight: 600; letter-spacing: -.03em; line-height: 1.04; margin-bottom: 22px; }\n  h2 { font-size: clamp(27px, 4vw, 36px); font-weight: 600; letter-spacing: -.02em; line-height: 1.1; margin-bottom: 14px; }\n  h3 { font-size: 19px; font-weight: 600; letter-spacing: -.01em; margin-bottom: 7px; }\n  .lead { font-size: 19px; color: var(--ink-2); max-width: 600px; }\n  .muted { color: var(--ink-2); }\n  mark { background: var(--mark); color: inherit; padding: 0 .12em; border-radius: 3px; box-decoration-break: clone; -webkit-box-decoration-break: clone; }\n\n  /* Hero */\n  .hero { padding: 60px 0 80px; }\n  .tag { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; color: var(--ink-2); border: 1px solid var(--line); background: #fff; border-radius: 99px; padding: 5px 13px; margin-bottom: 26px; }\n  .tag .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }\n  .hero-actions { display: flex; gap: 12px; margin-top: 30px; flex-wrap: wrap; }\n  .hero .note { margin-top: 18px; font-size: 14px; color: var(--ink-3); }\n  .replaces { margin-top: 30px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; font-size: 14px; color: var(--ink-3); }\n  .replaces .lbl { font-weight: 600; color: var(--ink-2); }\n  .replaces .chips { display: flex; gap: 8px; flex-wrap: wrap; }\n  .rchip { display: inline-flex; align-items: center; gap: 7px; font-size: 13.5px; color: var(--ink-2); background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 5px 11px; }\n  .rchip .g { width: 14px; height: 14px; border-radius: 4px; background: #e3e0da; flex-shrink: 0; }\n\n  /* Mock */\n  .shot { margin-top: 44px; border: 1px solid var(--line); border-radius: 14px; background: var(--card); overflow: hidden; box-shadow: 0 18px 44px -28px rgba(44,42,38,.28); }\n  .shot-bar { height: 38px; border-bottom: 1px solid var(--line-2); display: flex; align-items: center; gap: 6px; padding: 0 14px; }\n  .shot-bar i { width: 9px; height: 9px; border-radius: 50%; background: #e3e0da; display: block; }\n  .shot-body { aspect-ratio: 16/9; background: repeating-linear-gradient(135deg, #f4f3f0 0 11px, #f9f8f6 11px 22px); display: grid; place-items: center; }\n  .shot-cap { font-family: ui-monospace, \"SF Mono\", Menlo, monospace; font-size: 12.5px; color: var(--ink-3); background: rgba(255,255,255,.7); border: 1px solid var(--line); border-radius: 7px; padding: 7px 13px; }\n  .mock-labels { display: flex; justify-content: center; gap: 26px; margin-top: 16px; flex-wrap: wrap; font-size: 13.5px; color: var(--ink-3); }\n  .mock-labels span { position: relative; }\n  .mock-labels span::before { content: \"\"; display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--ink-3); margin-right: 8px; vertical-align: middle; }\n\n  /* Feature blocks */\n  .fblock { display: grid; grid-template-columns: 1fr 1fr; gap: 44px; align-items: center; }\n  .fblock + .fblock { margin-top: 72px; padding-top: 72px; border-top: 1px solid var(--line-2); }\n  .fblock.rev .ftext { order: 2; }\n  .ftext p { color: var(--ink-2); font-size: 16px; margin-top: 6px; max-width: 460px; }\n  .ftext ul { list-style: none; margin-top: 16px; display: flex; flex-direction: column; gap: 9px; }\n  .ftext li { display: flex; gap: 10px; font-size: 15px; color: var(--ink-2); }\n  .ftext li::before { content: \"\"; flex-shrink: 0; margin-top: 8px; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }\n  .fblock.green .ftext li::before { background: var(--green); }\n  .fblock.orange .ftext li::before { background: var(--orange); }\n  .f-mock { border: 1px solid var(--line); border-radius: 12px; background: var(--card); overflow: hidden; box-shadow: 0 14px 36px -26px rgba(44,42,38,.26); }\n  .f-mock .shot-body { aspect-ratio: 4/3; }\n\n  /* ---- Animated demos ---- */\n  .frame { border: 1px solid var(--line); border-radius: 14px; background: var(--card); overflow: hidden; box-shadow: 0 18px 44px -28px rgba(44,42,38,.28); }\n  .frame.sm { box-shadow: 0 14px 36px -26px rgba(44,42,38,.26); }\n  .chrome { height: 40px; border-bottom: 1px solid var(--line-2); display: flex; align-items: center; gap: 7px; padding: 0 14px; background: #f7f6f3; }\n  .chrome i { width: 9px; height: 9px; border-radius: 50%; background: #e0ddd6; display: block; }\n  .chrome .addr { margin-left: 10px; flex: 1; height: 20px; border-radius: 6px; background: #efeee9; }\n  .demo-cap { margin-top: 12px; font-size: 12.5px; color: var(--ink-3); text-align: center; }\n\n  /* hero tab strip */\n  .hero-demo { margin-top: 44px; }\n  .strip { display: flex; gap: 5px; padding: 10px 12px 0; background: #f7f6f3; overflow: hidden; }\n  .tab { disp =\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg>\n                <svg class=\"tsp-folder\" width=\"17\" height=\"15\" viewBox=\"0 0 24 22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M3 6a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2z\"><\u002Fpath><path d=\"M3 9h18\"><\u002Fpath><\u002Fsvg>\n                <div class=\"tsp-wmain\">\n                  <div class=\"tsp-wtitle-row\">\n                    <span class=\"tsp-wtitle purple\">ccccc<\u002Fspan>\n                    <span class=\"tsp-badge locked\"><svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M7 10V8a5 5 0 0110 0v2h1a1 1 0 011 1v8a1 1 0 01-1 1H6a1 1 0 01-1-1v-8a1 1 0 011-1zm2 0h6V8a3 3 0 00-6 0z\"><\u002Fpath><\u002Fsvg>Locked<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"tsp-wright\">\n                  <span class=\"tsp-wcount\">1 tab<\u002Fspan>\n                  <span class=\"tsp-wact tsp-kebab\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan>\n                  <span class=\"tsp-wact\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\"><path d=\"M6 6l12 12M18 6L6 18\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"tsp-row\">\n                <span class=\"tsp-fav\" style=\"background:#4caf6a;color:#fff;font-size:9px;font-weight:800\">C<\u002Fspan>\n                <span class=\"tsp-rtext\"><span class=\"tsp-rtitle\">Save Our Local Library · Change.org<\u002Fspan><span class=\"tsp-rurl\">www.change.org/p/save-our-library<\u002Fspan><\u002Fspan>\n                <span class=\"tsp-rwhen\">2d 4h ago<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mock-labels\"><span>All tabs<\u002Fspan><span>Parked<\u002Fspan><span>Search<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"features\" data-screen-label=\"Features\">\n  <div class=\"wrap\">\n    <div class=\"fblock orange\">\n      <div class=\"ftext\">\n        <p class=\"eyebrow orange\">Session Recovery<\u002Fp>\n        <h2>Windows that survive a restart.<\u002Fh2>\n        <p>If Chrome closes for any reason, a crash, a force-quit, or a normal restart, your windows reopen the way you left them.<\u002Fp>\n        <ul>\n          <li>Restarts are detected automatically<\u002Fli>\n          <li>Each window is matched to its saved state<\u002Fli>\n          <li>Works even when Chrome's own restore doesn't<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <div class=\"frame sm\" data-demo=\"recover\">\n          <div class=\"chrome\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><span class=\"addr\"><\u002Fspan><\u002Fdiv>\n          <div class=\"recover-body\">\n            <span class=\"rec-badge\" data-badge=\"\">Running<\u002Fspan>\n            <div class=\"win\"><div class=\"bar\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv><div class=\"ln\"><\u002Fdiv><div class=\"ln s\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"win\"><div class=\"bar\"><i><\u002Fi><i><\u002Fi><\u002Fdiv><div class=\"ln\"><\u002Fdiv><div class=\"ln s\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"win\"><div class=\"bar\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv><div class=\"ln\"><\u002Fdiv><div class=\"ln s\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"win\"><div class=\"bar\"><i><\u002Fi><i><\u002Fi><\u002Fdiv><div class=\"ln\"><\u002Fdiv><div class=\"ln s\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"demo-cap\">Chrome quits, then every window is restored<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"fblock green rev\">\n      <div class=\"ftext\">\n        <p class=\"eyebrow green\">Auto-Park<\u002Fp>\n        <h2>Close the clutter. Keep every tab.<\u002Fh2>\n        <p>When a tab sits untouched past a timer you set, TabSidecar closes it and adds it to a list you can search and reopen.<\u002Fp>\n        <ul>\n          <li>You choose the timer, from an hour to a few weeks<\u002Fli>\n          <li>Parked tabs are searchable and reopen in one click<\u002Fli>\n          <li>Pinned tabs are left alone<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <div class=\"frame sm\" data-demo=\"hero\">\n          <div class=\"chrome\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><span class=\"addr\"><\u002Fspan><\u002Fdiv>\n          <div class=\"strip\" data-strip=\"\"><\u002Fdiv>\n          <div class=\"page\">\n            <div style=\"flex:1;display:flex;flex-direction:column;gap:8px;\">\n              <div class=\"ph\" style=\"width:52%\"><\u002Fdiv>\n              <div class=\"ph\" style=\"width:80%\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tray\">\n            <div class=\"tray-head\">Parked <span class=\"pk\" data-count=\"\">35<\u002Fspan> <span>tabs · one click to reopen<\u002Fspan><\u002Fdiv>\n            <div class=\"tray-list\" data-tray=\"\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"demo-cap\">Idle tabs close and drop into the parked list<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"fblock purple\">\n      <div class=\"ftext\">\n        <p class=\"eyebrow purple\">Window Management<\u002Fp>\n        <h2>Take control of every window.<\u002Fh2>\n        <p>See all your open windows in one place, then title, lock, anchor, or save any one of them.<\u002Fp>\n        <ul>\n          <li>Give any window a title you'll recognize<\u002Fli>\n          <li>Lock a window so its tabs are never auto-parked<\u002Fli>\n          <li>Save a window and reopen the whole set later<\u002Fli>\n        <\u002Ful>\n        <p class=\"muted\" style=\"font-size:14px;margin-top:14px;\">More window controls are coming with Pro.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div class=\"frame sm\" data-demo=\"windows\">\n          <div class=\"chrome\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><span class=\"addr\"><\u002Fspan><\u002Fdiv>\n          <div class=\"win-body\">\n            <div class=\"win-head\">Windows <span class=\"ct\">3 open<\u002Fspan><\u002Fdiv>\n            <div class=\"win-list\">\n              <div class=\"win-card active\" data-active=\"\">\n                <span class=\"win-ic\"><\u002Fspan>\n                <span class=\"nm\" data-name=\"\">Untitled window<\u002Fspan>\n                <span class=\"right\">\n                  <span class=\"pill lock\" data-lockpill=\"\">Locked<\u002Fspan>\n                  <span class=\"pill saved\" data-savedpill=\"\">Saved<\u002Fspan>\n                  <span class=\"meta\">7 tabs<\u002Fspan>\n                <\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"win-card\"><span class=\"win-ic\"><\u002Fspan><span class=\"nm\">Client work<\u002Fspan><span class=\"right\"><span class=\"meta\">12 tabs<\u002Fspan><\u002Fspan><\u002Fdiv>\n              <div class=\"win-card\"><span class=\"win-ic\"><\u002Fspan><span class=\"nm\">Reading list<\u002Fspan><span class=\"right\"><span class=\"meta\">9 tabs<\u002Fspan><\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"win-actions\">\n              <span class=\"wact\" data-act=\"title\">Title<\u002Fspan>\n              <span class=\"wact\" data-act=\"lock\">Lock<\u002Fspan>\n              <span class=\"wact\" data-act=\"save\">Save<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"win-hint\" data-hint=\"\">&nbsp;<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"demo-cap\">Title, lock, and save any open window<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"fblock rev\">\n      <div class=\"ftext\">\n        <p class=\"eyebrow blue\">Smart Organizer<\u002Fp>\n        <h2>Tabs that sort themselves.<\u002Fh2>\n        <p>Set rules for where tabs belong and they move there as soon as they open: work in one window, shopping in another.<\u002Fp>\n        <ul>\n          <li>Match on the URL or page title, no regex to write<\u002Fli>\n          <li>Auto-move or auto-close anything that matches<\u002Fli>\n          <li>Built-in rules for common AI tools<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <div class=\"frame sm\" data-demo=\"sort\">\n          <div class=\"chrome\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><span class=\"addr\"><\u002Fspan><\u002Fdiv>\n          <div class=\"sort-body\">\n            <div class=\"sort-pool\" data-pool=\"\">\n              <span class=\"chip-s\" data-to=\"work\"><span class=\"d\" style=\"background:#3a63d6\"><\u002Fspan>github.com<\u002Fspan>\n              <span class=\"chip-s\" data-to=\"shop\"><span class=\"d\" style=\"background:#cf7a2c\"><\u002Fspan>amazon.com<\u002Fspan>\n              <span class=\"chip-s\" data-to=\"ai\"><span class=\"d\" style=\"background:#7a52cf\"><\u002Fspan>chatgpt.com<\u002Fspan>\n              <span class=\"chip-s\" data-to=\"work\"><span class=\"d\" style=\"background:#3a63d6\"><\u002Fspan>linear.app<\u002Fspan>\n              <span class=\"chip-s\" data-to=\"shop\"><span class=\"d\" style=\"background:#cf7a2c\"><\u002Fspan>etsy.com<\u002Fspan>\n              <span class=\"chip-s\" data-to=\"ai\"><span class=\"d\" style=\"background:#7a52cf\"><\u002Fspan>claude.ai<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"sort-cols\">\n              <div class=\"sort-col\"><h5><span class=\"d\" style=\"background:#3a63d6\"><\u002Fspan>Work<\u002Fh5><div class=\"slot\" data-col=\"work\"><\u002Fdiv><\u002Fdiv>\n              <div class=\"sort-col\"><h5><span class=\"d\" style=\"background:#cf7a2c\"><\u002Fspan>Shopping<\u002Fh5><div class=\"slot\" data-col=\"shop\"><\u002Fdiv><\u002Fdiv>\n              <div class=\"sort-col\"><h5><span class=\"d\" style=\"background:#7a52cf\"><\u002Fspan>AI tools<\u002Fh5><div class=\"slot\" data-col=\"ai\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"demo-cap\">New tabs route into the right window<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-screen-label=\"First week\">\n  <div class=\"wrap\">\n    <div class=\"tl-head\">\n      <p class=\"eyebrow purple\">The first week<\u002Fp>\n      <h2>What changes after a few days.<\u002Fh2>\n      <p class=\"lead\">No setup project. It starts helping the moment it's installed, and gets more useful as it learns your habits.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"timeline\">\n      <span class=\"tl-stop now\">Today<\u002Fspan>\n      <span class=\"tl-line\"><\u002Fspan>\n      <span class=\"tl-stop\">Day 3<\u002Fspan>\n      <span class=\"tl-line\"><\u002Fspan>\n      <span class=\"tl-stop\">Day 7<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"tl-cols\">\n      <div class=\"tl-col\">\n        <h3>Today<\u002Fh3>\n        <ul>\n          <li>See every tab grouped by window<\u002Fli>\n          <li>Search across all windows at once<\u002Fli>\n          <li>Turn on Auto-Park and set a timer<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"tl-col\">\n        <h3>Day 3<\u002Fh3>\n        <ul>\n          <li>Inactive tabs are parking themselves<\u002Fli>\n          <li>A restart no longer loses your windows<\u002Fli>\n          <li>First few rules routing new tabs<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"tl-col\">\n        <h3>Day 7<\u002Fh3>\n        <ul>\n          <li>A tab bar you can actually read<\u002Fli>\n          <li>Nothing lost, everything searchable<\u002Fli>\n          <li>Labels and nicknames where you want them<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-screen-label=\"How it works\">\n  <div class=\"wrap\">\n    <p class=\"eyebrow blue\">How it works<\u002Fp>\n    <h2>Up and running in minutes.<\u002Fh2>\n    <div class=\"steps3\">\n      <div class=\"s3\"><div class=\"n\">1<\u002Fdiv><h3>Install it<\u002Fh3><p>One click from the Chrome Web Store. No account, no email.<\u002Fp><\u002Fdiv>\n      <div class=\"s3\"><div class=\"n\">2<\u002Fdiv><h3>Open the popup<\u002Fh3><p>Your tabs are grouped by window, ready to search and sort.<\u002Fp><\u002Fdiv>\n      <div class=\"s3\"><div class=\"n\">3<\u002Fdiv><h3>Turn on Auto-Park<\u002Fh3><p>Pick how long a tab can sit untouched before it gets closed.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TEMPORARILY REMOVED — \"Where it stands / Built in the open\" section. Uncomment to restore.\n<section data-screen-label=\"Building in the open\">\n  <div class=\"wrap\">\n    <p class=\"eyebrow blue\">Where it stands<\u002Fp>\n    <h2>Built in the open.<\u002Fh2>\n    <div class=\"honest\">\n      <p class=\"q\"><strong>It's a beta, built by one person.<\u002Fstrong> Nothing gets deleted, you can export everything at any time, and bugs get fixed when you report them.<\u002Fp>\n      <p class=\"by\">A note from the person building TabSidecar<\u002Fp>\n      <div class=\"row\">\n        <div><h4>Free during beta<\u002Fh4><p>The whole extension is free while it's in development.<\u002Fp><\u002Fdiv>\n        <div><h4>Your data stays put<\u002Fh4><p>It runs locally in your browser. Export to JSON or CSV anytime.<\u002Fp><\u002Fdiv>\n        <div><h4>Shipping often<\u002Fh4><p>New features and fixes land regularly. Tell us what you need.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n-->\n\n<section data-screen-label=\"FAQ\">\n  <div class=\"wrap\">\n    <p class=\"eyebrow blue\">Questions<\u002Fp>\n    <h2>Common questions.<\u002Fh2>\n    <div class=\"faq\">\n      <details open=\"\"><summary>Is it really free?<span class=\"chev\"><\u002Fspan><\u002Fsummary><div class=\"a\">Yes. It's free while in beta. We're working on a paid Pro plan with AI features, but everything available now will stay free.<\u002Fdiv><\u002Fdetails>\n      <details><summary>Do parked tabs get deleted?<span class=\"chev\"><\u002Fspan><\u002Fsummary><div class=\"a\">No. Parking a tab closes it but saves it to a searchable list. One click brings it back, and pinned tabs are never parked.<\u002Fdiv><\u002Fdetails>\n      <details><summary>Do I need an account?<span class=\"chev\"><\u002Fspan><\u002Fsummary><div class=\"a\">No. There's no sign-up. TabSidecar runs locally in your browser.<\u002Fdiv><\u002Fdetails>\n      <details><summary>Will it close tabs I'm actively using?<span class=\"chev\"><\u002Fspan><\u002Fsummary><div class=\"a\">Only tabs you haven't touched since the timer you set. Pinned tabs are never closed.<\u002Fdiv><\u002Fdetails>\n      <details><summary>Does it restore everything when Chrome starts?<span class=\"chev\"><\u002Fspan><\u002Fsummary><div class=\"a\">Not all at once. The anchor window restores immediately when Chrome starts, and any other windows from the previous session stay available in the UI for you to restore if you want them.<\u002Fdiv><\u002Fdetails>\n      <details><summary>Can I back up my data?<span class=\"chev\"><\u002Fspan><\u002Fsummary><div class=\"a\">Yes. Export your tabs, labels, filters, and settings to JSON or CSV, and import them back later.<\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"pricing\" data-screen-label=\"Pricing\">\n  <div class=\"wrap\">\n    <p class=\"eyebrow blue\">Pricing<\u002Fp>\n    <h2>Free now. Pro later.<\u002Fh2>\n    <p class=\"lead\">Everything TabSidecar does now is free. Pro adds a free account that unlocks cloud save and AI features. It will be optional, and the basics will stay free.<\u002Fp>\n    <div class=\"plans\">\n      <div class=\"plan\">\n        <div class=\"plan-name\">Free <span class=\"chip\">Available now<\u002Fspan><\u002Fdiv>\n        <div class=\"price\">$0<small> / for the basics<\u002Fsmall><\u002Fdiv>\n        <ul>\n          <li>Auto-Park with a timer you control<\u002Fli>\n          <li>Session Recovery and anchor windows<\u002Fli>\n          <li>Smart Organizer rules<\u002Fli>\n          <li>Labels, nicknames and search<\u002Fli>\n          <li>Backup and restore to JSON / CSV<\u002Fli>\n        <\u002Ful>\n        <a href=\"#\" class=\"btn\">Add to Chrome<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"plan soon\">\n        <div class=\"plan-name\">Pro <span class=\"chip grey\">Coming soon<\u002Fspan><\u002Fdiv>\n        <div class=\"price\" style=\"color:var(--ink-3);\">TBD<\u002Fdiv>\n        <ul>\n          <li>Cloud save, so your tabs survive anything: crashes, corruption, or a new device<\u002Fli>\n          <li>AI auto-organizing and natural-language search<\u002Fli>\n          <li>AI-powered smart suggestions, recaps and more<\u002Fli>\n        <\u002Ful>\n        <span class=\"btn btn-disabled\">Coming soon<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer>\n  <div class=\"wrap\">\n    <div class=\"foot-grid\">\n      <div>\n        <a href=\"#\" class=\"logo\" style=\"margin-bottom:12px;\"><img class=\"logo-ic\" src=\"icons/icon32.png\" alt=\"\" width=\"20\" height=\"20\">TabSidecar<\u002Fa>\n        <p>A tab manager for Chrome. Closes what you're not using, keeps everything you might need.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h5>Product<\u002Fh5>\n        <a href=\"#features\">Features<\u002Fa>\n        <a href=\"#pricing\">Pricing<\u002Fa>\n        <a href=\"#\">Changelog<\u002Fa>\n      <\u002Fdiv>\n      <div>\n        <h5>Support<\u002Fh5>\n        <a href=\"mailto:support@tabsidecar.com\">Help<\u002Fa>\n        <a href=\"mailto:support@tabsidecar.com?subject=TabSidecar%20bug%20report&amp;body=What%20happened%3F%0A%0AWhat%20did%20you%20expect%20to%20happen%3F%0A%0ASteps%20to%20reproduce%3A%0A1.%20%0A2.%20%0A3.%20%0A%0ABrowser%20or%20device%20details%3A%0A%0AAnything%20else%20that%20might%20help%3F%0A\">Report a bug<\u002Fa>\n        <a href=\"mailto:support@tabsidecar.com?subject=TabSidecar%20feature%20request&amp;body=What%20are%20you%20trying%20to%20do%3F%0A%0AWhat%20would%20you%20like%20TabSidecar%20to%20add%20or%20change%3F%0A%0AWhy%20would%20this%20help%3F%0A%0AAny%20examples%2C%20screenshots%2C%20or%20links%3F%0A\">Request a feature<\u002Fa>\n      <\u002Fdiv>\n      <div>\n        <h5>About<\u002Fh5>\n        <a href=\"privacy.html\">Privacy<\u002Fa>\n        <a href=\"#\">Contact<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-bottom\">\n      <span>Free Chrome extension · Beta<\u002Fspan>\n      <span>Built in the open<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n/* TabSidecar — minimal landing animations.\n   Each demo loops only while on screen, and pauses when reduced-motion is set. */\n(function () {\n  \"use strict\";\n  var reduce = window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches;\n\n  function el(tag, cls, txt) {\n    var n = document.createElement(tag);\n    if (cls) n.className = cls;\n    if (txt != null) n.textContent = txt;\n    return n;\n  }\n  function onView(node, enter, leave) {\n    if (!(\"IntersectionObserver\" in window)) { enter(); return; }\n    var io = new IntersectionObserver(function (ents) {\n      ents.forEach(function (e) {\n        if (e.isIntersecting) enter(); else if (leave) leave();\n      });\n    }, { threshold: 0.35 });\n    io.observe(node);\n  }\n\n  function heroDemo(root) {\n    var TABS = [\n      { t: \"Inbox\", fav: \"#3a63d6\" },\n      { t: \"Auth docs\", fav: \"#7a52cf\" },\n      { t: \"Pricing notes\", fav: \"#3a63d6\" }\n    ];\n    var IDLE = [1, 2];\n    var strip = root.querySelector(\"[data-strip]\");\n    var tray = root.querySelector(\"[data-tray]\");\n    var count = root.querySelector(\"[data-count]\");\n    var nodes = [];\n    function build() {\n      strip.innerHTML = \"\"; tray.innerHTML = \"\"; nodes = [];\n      TABS.forEach(function (tab, i) {\n        var n = el(\"div\", \"tab\");\n        var f = el(\"span\", \"fav\"); f.style.background = tab.fav;\n        n.appendChild(f); n.appendChild(el(\"span\", \"tt\", tab.t)); n.appendChild(el(\"span\", \"x\", \"×\"));\n        if (i === 0) n.classList.add(\"active\");\n        strip.appendChild(n); nodes.push(n);\n      });\n      count.textContent = \"35\";\n    }\n    var timers = [];\n    function clear() { timers.forEach(clearTimeout); timers = []; }\n    function later(fn, ms) { timers.push(setTimeout(fn, ms)); }\n    var running = false;\n    function run() {\n      if (running) return; running = true; build();\n      var parked = 0;\n      IDLE.forEach(function (idx, k) {\n        later(function () {\n          var n = nodes[idx]; if (!n) return;\n          n.classList.add(\"parking\");\n          later(function () {\n            n.classList.add(\"parked\");\n            parked++; count.textContent = String(35 + parked);\n            var pill = el(\"div\", \"ptab\");\n            var f = el(\"span\", \"fav\"); f.style.background = TABS[idx].fav;\n            pill.appendChild(f); pill.appendChild(el(\"span\", \"tt\", TABS[idx].t));\n            pill.style.opacity = \"0\"; tray.appendChild(pill);\n            requestAnimationFrame(function () { pill.style.opacity = \"1\"; });\n          }, 420);\n        }, 1100 + k * 1200);\n      });\n      later(function () { running = false; run(); }, 1100 + IDLE.length * 1200 + 2600);\n    }\n    build();\n    if (reduce) {\n      IDLE.forEach(function (idx) {\n        var pill = el(\"div\", \"ptab\");\n        var f = el(\"span\", \"fav\"); f.style.background = TABS[idx].fav;\n        pill.appendChild(f); pill.appendChild(el(\"span\", \"tt\", TABS[idx].t));\n        tray.appendChild(pill); nodes[idx].classList.add(\"parked\");\n      });\n      count.textContent = \"37\"; return;\n    }\n    onView(root, run, function () { running = false; clear(); });\n  }\n\n  function parkDemo(root) {\n    var live = root.querySelector(\"[data-live]\");\n    var rows = Array.prototype.slice.call(live.querySelectorAll(\".row\"));\n    var running = false, timers = [];\n    function clear() { timers.forEach(clearTimeout); timers = []; }\n    function reset() { rows.forEach(function (r) { r.classList.remove(\"gone\"); }); }\n    function loop() {\n      if (running) return; running = true; reset();\n      rows.forEach(function (r, i) {\n        timers.push(setTimeout(function () { r.classList.add(\"gone\"); }, 900 + i * 700));\n      });\n      timers.push(setTimeout(function () { running = false; loop(); }, 900 + rows.length * 700 + 1800));\n    }\n    if (reduce) { rows.forEach(function (r, i) { if (i > 1) r.classList.add(\"gone\"); }); return; }\n    onView(root, loop, function () { running = false; clear(); });\n  }\n\n  function sortDemo(root) {\n    var pool = root.querySelector(\"[data-pool]\");\n    var chips = Array.prototype.slice.call(pool.querySelectorAll(\".chip-s\"));\n    var cols = {};\n    root.querySelectorAll(\"[data-col]\").forEach(function (c) { cols[c.getAttribute(\"data-col\")] = c; });\n    var running = false, timers = [];\n    function clear() { timers.forEach(clearTimeout); timers = []; }\n    function reset() {\n      chips.forEach(function (c) {\n        c.style.opacity = \"0\"; pool.appendChild(c);\n        requestAnimationFrame(function () { c.style.opacity = \"1\"; });\n      });\n    }\n    function loop() {\n      if (running) return; running = true; reset();\n      chips.forEach(function (c, i) {\n        timers.push(setTimeout(function () {\n          c.style.opacity = \"0\";\n          timers.push(setTimeout(function () {\n            var dest = cols[c.getAttribute(\"data-to\")];\n            if (dest) { dest.appendChild(c); }\n            requestAnimationFrame(function () { c.style.opacity = \"1\"; });\n          }, 200));\n        }, 700 + i * 360));\n      });\n      timers.push(setTimeout(function () { running = false; loop(); }, 700 + chips.length * 360 + 2200));\n    }\n    if (reduce) {\n      chips.forEach(function (c) {\n        var dest = cols[c.getAttribute(\"data-to\")];\n        if (dest) { dest.appendChild(c); }\n      });\n      return;\n    }\n    onView(root, loop, function () { running = false; clear(); });\n  }\n\n  function recoverDemo(root) {\n    var wins = Array.prototype.slice.call(root.querySelectorAll(\".win\"));\n    var badge = root.querySelector(\"[data-badge]\");\n    var running = false, timers = [];\n    function clear() { timers.forEach(clearTimeout); timers = []; }\n    function loop() {\n      if (running) return; running = true;\n      wins.forEach(function (w) { w.classList.remove(\"lost\", \"restored\"); });\n      if (badge) badge.textContent = \"Running\";\n      timers.push(setTimeout(function () {\n        wins.forEach(function (w) { w.classList.add(\"lost\"); });\n        if (badge) badge.textContent = \"Chrome quit\";\n      }, 1400));\n      wins.forEach(function (w, i) {\n        timers.push(setTimeout(function () {\n          w.classList.remove(\"lost\"); w.classList.add(\"restored\");\n          if (badge && i === 0) badge.textContent = \"Restored\";\n        }, 2800 + i * 420));\n      });\n      timers.push(setTimeout(function () { running = false; loop(); }, 2800 + wins.length * 420 + 2200));\n    }\n    if (reduce) { if (badge) badge.textContent = \"Restored\"; return; }\n    onView(root, loop, function () { running = false; clear(); });\n  }\n\n  function windowsDemo(root) {\n    var nameEl = root.querySelector(\"[data-name]\");\n    var lockPill = root.querySelector(\"[data-lockpill]\");\n    var savedPill = root.querySelector(\"[data-savedpill]\");\n    var hint = root.querySelector(\"[data-hint]\");\n    var acts = {};\n    root.querySelectorAll(\".wact\").forEach(function (a) { acts[a.getAttribute(\"data-act\")] = a; });\n    var NAME = \"Research\";\n    var running = false, timers = [];\n    function clear() { timers.forEach(clearTimeout); timers = []; }\n    function later(fn, ms) { timers.push(setTimeout(fn, ms)); }\n    function offAll() { Object.keys(acts).forEach(function (k) { acts[k].classList.remove(\"on\"); }); }\n    function reset() {\n      offAll();\n      nameEl.textContent = \"Untitled window\";\n      lockPill.classList.remove(\"show\");\n      savedPill.classList.remove(\"show\");\n      hint.innerHTML = \"&nbsp;\";\n    }\n    function loop() {\n      if (running) return; running = true; reset();\n      // 1. title\n      later(function () {\n        offAll(); acts.title.classList.add(\"on\");\n        hint.textContent = \"Give the window a title\";\n        nameEl.innerHTML = '<span class=\"caret\">▏<\u002Fspan>';\n        var i = 0;\n        function type() {\n          if (i <= NAME.length) {\n            nameEl.innerHTML = NAME.slice(0, i) + '<span class=\"caret\">▏<\u002Fspan>';\n            i++; later(type, 120);\n          } else { nameEl.textContent = NAME; }\n        }\n        type();\n      }, 800);\n      var afterType = 800 + (NAME.length + 1) * 120 + 500;\n      // 2. lock\n      later(function () {\n        offAll(); acts.lock.classList.add(\"on\");\n        lockPill.classList.add(\"show\");\n        hint.textContent = \"Locked, so its tabs are never auto-parked\";\n      }, afterType);\n      // 3. save\n      later(function () {\n        offAll(); acts.save.classList.add(\"on\");\n        savedPill.classList.add(\"show\");\n        hint.textContent = \"Saved, reopen the whole window anytime\";\n      }, afterType + 1600);\n      // restart\n      later(function () { running = false; loop(); }, afterType + 1600 + 2600);\n    }\n    if (reduce) {\n      nameEl.textContent = NAME;\n      lockPill.classList.add(\"show\");\n      savedPill.classList.add(\"show\");\n      hint.textContent = \"Titled, locked, and saved\";\n      return;\n    }\n    onView(root, loop, function () { running = false; clear(); });\n  }\n\n  function init() {\n    document.querySelectorAll(\"[data-demo='hero']\").forEach(heroDemo);\n    document.querySelectorAll(\"[data-demo='park']\").forEach(parkDemo);\n    document.querySelectorAll(\"[data-demo='sort']\").forEach(sortDemo);\n    document.querySelectorAll(\"[data-demo='recover']\").forEach(recoverDemo);\n    document.querySelectorAll(\"[data-demo='windows']\").forEach(windowsDemo);\n  }\n  if (document.readyState === \"loading\") {\n    document.addEventListener(\"DOMContentLoaded\", init);\n  } else { init(); }\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
